# CRIC agent configuration
#
# The DuckDB output path is NOT set here — it is required via --data PATH
# on the command line so it can vary between deployments without editing
# this file.
#
# Minimal one-shot run for testing:
#   askpanda-cric-agent --data /tmp/cric.db --once

# Path to cric_pandaqueues.json on CVMFS.
# cric_path: /cvmfs/atlas.cern.ch/repo/sw/local/etc/cric_pandaqueues.json
cric_path: /Users/nilsnilsson/Development/cric_pandaqueues.json


# How often to re-read the file and reload the database, in seconds.
# CVMFS propagates updates from the stratum-0 every ~30 minutes, but the
# exact timing is not predictable, so a 10-minute poll is a good balance
# between freshness and unnecessary I/O.
refresh_interval_s: 600   # 10 minutes

# How long to sleep between tick() calls.  The tick itself is a no-op if
# refresh_interval_s has not elapsed, so this can be kept short without
# causing excessive work.
tick_interval_s: 60.0
